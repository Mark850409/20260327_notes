services:
  # ── MySQL ────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: notes_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    networks:
      - notes_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Strapi CMS ───────────────────────────────────────────
  strapi:
    build:
      context: ./strapi
      dockerfile: Dockerfile
    container_name: notes_strapi
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_CLIENT: mysql
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_NAME: ${MYSQL_DATABASE}
      DATABASE_USERNAME: ${MYSQL_USER}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET: ${STRAPI_JWT_SECRET}
      ADMIN_JWT_SECRET: ${STRAPI_ADMIN_JWT_SECRET}
      API_TOKEN_SALT: ${STRAPI_API_TOKEN_SALT}
      APP_KEYS: ${STRAPI_APP_KEYS}
      TRANSFER_TOKEN_SALT: ${STRAPI_TRANSFER_TOKEN_SALT}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      INLINE_IMAGE_MAX_BYTES: ${INLINE_IMAGE_MAX_BYTES:-5242880}
    volumes:
      - strapi_uploads:/opt/app/public/uploads
      - ./strapi/src:/opt/app/src              # ← persist Content Types schema
    ports:
      - "1337:1337"
    networks:
      - notes_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:1337/_health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    command: npm run develop

  # ── Flask API ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: notes_backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      strapi:
        condition: service_healthy
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      FLASK_DEBUG: ${FLASK_DEBUG:-0}
      DATABASE_URL: ${DATABASE_URL}
      STRAPI_URL: http://strapi:1337
      STRAPI_PUBLIC_URL: ${STRAPI_PUBLIC_URL:-http://localhost:1337}
    ports:
      - "5000:5000"
    networks:
      - notes_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Astro SSR Frontend ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_BASE: http://backend:5000
        PUBLIC_SITE_TITLE: ${PUBLIC_SITE_TITLE:-My Notes}
        PUBLIC_SITE_DESCRIPTION: ${PUBLIC_SITE_DESCRIPTION:-A personal knowledge base}
    container_name: notes_frontend
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    environment:
      API_BASE: http://backend:5000
    ports:
      - "4321:4321"
    networks:
      - notes_net

  # ── Nginx Reverse Proxy ───────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: notes_nginx
    restart: always
    depends_on:
      - frontend
      - backend
      - strapi
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - notes_net

networks:
  notes_net:
    driver: bridge

volumes:
  mysql_data:
  strapi_uploads:
