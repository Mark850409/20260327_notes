events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    server {
        listen 80;
        server_name _;

        # Docker internal DNS — lazy resolution per request (not at Nginx startup)
        resolver 127.0.0.11 valid=10s ipv6=off;

        # ── Swagger UI (/docs/ → backend:5000) ───────────────────────────
        location /docs/ {
            set $be http://backend:5000;
            proxy_pass         $be;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # ── Flask REST API (/api/ → backend:5000) ────────────────────────
        # NOTE: /api/articles/import-markdown 是 Strapi 匯入端點，需優先轉到 Strapi
        location = /api/articles/import-markdown {
            set $strapi_upstream http://strapi:1337;
            proxy_pass         $strapi_upstream;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        location = /api/upload/inline-image {
            set $strapi_upstream http://strapi:1337;
            proxy_pass         $strapi_upstream;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        location /api/ {
            set $be http://backend:5000;
            proxy_pass         $be;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
            if ($request_method = OPTIONS) { return 204; }
        }

        # ── Strapi uploads (public media) ─────────────────────────────────
        location ^~ /uploads/ {
            set $strapi_upstream http://strapi:1337;
            proxy_pass         $strapi_upstream;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # ── Strapi: all internal API & admin paths ────────────────────────
        # Strapi serves itself at root (/admin/, /content-manager/, /upload/, etc.)
        # All these must be proxied to Strapi, NOT to Astro.
        location ~ ^/(admin|upload|uploads|content-manager|content-type-builder|users-permissions|email|i18n|review-workflows|homepage|project-type|information|permissions|license-limit-information|me|latest)(/|$) {
            set $cms http://strapi:1337;
            proxy_pass         $cms;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # ── /cms/ → redirect to /admin/ ──────────────────────────────────
        location = /cms   { return 301 /admin/; }
        location /cms/    { return 301 /admin/; }

        # ── Astro SSR frontend (catch-all) ────────────────────────────────
        location / {
            set $fe http://frontend:4321;
            proxy_pass         $fe;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }
}
